version: "3.9"

services:
  # ── FastAPI Backend ────────────────────────────────────
  api:
    build: .
    container_name: student-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - sqlite_data:/app/data
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  sqlite_data:
